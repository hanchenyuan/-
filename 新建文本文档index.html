<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>问卷入口</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        function isWeChat() {
            return /micromessenger/i.test(navigator.userAgent);
        }

        window.addEventListener("load", function () {

            var surveyUrl = "https://v.wjx.cn/vm/O0IZQpq.aspx#";

            // 微信内：提示用户手动打开
            if (isWeChat()) {
                document.getElementById("tip").style.display = "block";
                document.getElementById("jump").href = surveyUrl;
            } 
            // 非微信：自动跳转
            else {
                window.location.replace(surveyUrl);
            }
        });
    </script>

    <style>
        body {
            margin: 0;
            font-family: Arial, "Microsoft YaHei";
            text-align: center;
            background: #ffffff;
            color: #333;
        }

        .box {
            display: none;
            padding: 20vh 20px;
            line-height: 1.8;
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            background: #07c160;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
        }

        .highlight {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="tip" class="box">
        当前在微信内无法直接跳转问卷<br><br>

        请点击右上角 <span class="highlight">···</span><br>
        选择 <span class="highlight">“在浏览器中打开”</span><br><br>

        或点击下方按钮进入问卷<br><br>

        <a id="jump" class="btn" href="#">打开问卷</a>
    </div>

</body>
</html>
